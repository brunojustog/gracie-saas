name: Build and push image

# Builda a imagem Docker e publica no GitHub Container Registry (GHCR).
# Deploy em si é manual via Portainer (ver README seção Deploy).
#
# Como atualizar a app em produção depois desse build rodar:
#   1. Aguarde este workflow ficar verde (Actions tab)
#   2. No Portainer: Stacks → gracie-saas → Editor
#   3. Marque "Re-pull image and redeploy" e clique "Update the stack"

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-image
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute short sha
        id: sha
        run: echo "value=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.sha.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Summary
        run: |
          echo "✓ Image pushed:" >> $GITHUB_STEP_SUMMARY
          echo "  - \`${{ env.IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "  - \`${{ env.IMAGE }}:${{ steps.sha.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Próximo passo:** no Portainer, edite o stack \`gracie-saas\` e clique" >> $GITHUB_STEP_SUMMARY
          echo "*Re-pull image and redeploy*." >> $GITHUB_STEP_SUMMARY
