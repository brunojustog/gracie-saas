name: Deploy to manager

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tags.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: tags
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.tags.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy stack.yml to manager
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.MANAGER_HOST }}
          username: ${{ secrets.MANAGER_USER }}
          key: ${{ secrets.MANAGER_SSH_KEY }}
          source: "stack.yml"
          target: "~/gracie-saas/"

      - name: Deploy stack on manager
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          TENANT_SLUG: ${{ secrets.TENANT_SLUG }}
          TENANT_NAME: ${{ secrets.TENANT_NAME }}
          SEED_ADMIN_EMAIL: ${{ secrets.SEED_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
          PUBLIC_HOST: ${{ secrets.PUBLIC_HOST }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.MANAGER_HOST }}
          username: ${{ secrets.MANAGER_USER }}
          key: ${{ secrets.MANAGER_SSH_KEY }}
          envs: IMAGE_TAG,AUTH_SECRET,DATABASE_URL,RESEND_API_KEY,EMAIL_FROM,TENANT_SLUG,TENANT_NAME,SEED_ADMIN_EMAIL,SEED_ADMIN_PASSWORD,PUBLIC_HOST,GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            cd ~/gracie-saas

            # Login do swarm no GHCR (precisa pra puxar imagens privadas)
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            export IMAGE_TAG AUTH_SECRET DATABASE_URL RESEND_API_KEY EMAIL_FROM
            export TENANT_SLUG TENANT_NAME SEED_ADMIN_EMAIL SEED_ADMIN_PASSWORD PUBLIC_HOST

            docker stack deploy -c stack.yml gracie-saas --with-registry-auth

            echo "✓ Deploy iniciado. Acompanhe com: docker service logs -f gracie-saas_app"
