version: "3.7"

# Stack do Gracie SaaS pra Docker Swarm.
# Padrão: Traefik com Let's Encrypt automático, rede `simplificanet` external,
# constraint no manager (mesma estrutura dos outros stacks da Simplifica).
#
# Deploy:
#   docker stack deploy -c stack.yml gracie-saas
#
# Variáveis lidas do environment do shell que rodar `docker stack deploy`:
#   IMAGE_TAG                — tag da imagem (default: latest)
#   AUTH_SECRET              — secret do Auth.js (gere com `openssl rand -base64 32`)
#   DATABASE_URL             — postgres://user:pass@postgres:5432/gracie_saas
#   RESEND_API_KEY           — chave do Resend
#   EMAIL_FROM               — sender (ex: "Gracie SaaS <noreply@simplificaonline.site>")
#   TENANT_SLUG              — slug do tenant em prod (ex: bgaf)
#   TENANT_NAME              — nome do tenant (ex: "Gracie Barra Anália Franco")
#   SEED_ADMIN_EMAIL         — email do super-admin
#   SEED_ADMIN_PASSWORD      — senha temporária do super-admin (trocar após primeiro login)
#   PUBLIC_HOST              — hostname público (bgaf.simplificaonline.site)

services:
  app:
    image: ghcr.io/brunojusto/gracie-saas:${IMAGE_TAG:-latest}
    networks:
      - simplificanet

    environment:
      - NODE_ENV=production
      - TZ=America/Sao_Paulo

      # Auth.js v5
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_URL=https://${PUBLIC_HOST}

      # Postgres (rodando no swarm como serviço `postgres`)
      - DATABASE_URL=${DATABASE_URL}

      # Email
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}

      # Tenant inicial (primeiro deploy roda RUN_SEED_ON_BOOT=true; remover depois)
      - TENANT_SLUG=${TENANT_SLUG:-bgaf}
      - TENANT_NAME=${TENANT_NAME}
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD}
      - RUN_SEED_ON_BOOT=${RUN_SEED_ON_BOOT:-false}

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 1024M
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

      labels:
        - traefik.enable=true
        - traefik.docker.network=simplificanet
        - traefik.http.services.gracie_saas.loadbalancer.server.port=3000
        - traefik.http.services.gracie_saas.loadbalancer.passhostheader=true

        # Roteia o host público pro app
        - traefik.http.routers.gracie_saas.rule=Host(`${PUBLIC_HOST}`)
        - traefik.http.routers.gracie_saas.entrypoints=websecure
        - traefik.http.routers.gracie_saas.tls=true
        - traefik.http.routers.gracie_saas.tls.certresolver=letsencryptresolver
        - traefik.http.routers.gracie_saas.service=gracie_saas

        # X-Forwarded-Proto pro Next confiar no proxy (NEXTAUTH_URL HTTPS)
        - traefik.http.middlewares.gracie_saas_ssl.headers.customrequestheaders.X-Forwarded-Proto=https
        - traefik.http.routers.gracie_saas.middlewares=gracie_saas_ssl@docker

networks:
  simplificanet:
    name: simplificanet
    external: true
