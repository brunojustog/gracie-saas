version: "3.8"

services:
  app:
    image: ghcr.io/brunojustog/gracie-saas:latest
    networks:
      - traefik-public
      - gracie-saas-internal
    environment:
      DATABASE_URL: "postgresql://gracie_saas:@postgres:5432/gracie_saas?schema=public"

      AUTH_SECRET: ""
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: "https://bgaf.simplificaonline.site"

      RESEND_API_KEY: ""
      EMAIL_FROM: "Gracie SaaS <noreply@simplificaonline.site>"

      TENANT_SLUG: "bgaf"
      TENANT_NAME: "Gracie Barra Anália Franco"

      SEED_ADMIN_EMAIL: "bruno@simplificaonline.site"
      SEED_ADMIN_PASSWORD: ""
      SEED_ADMIN_NAME: "Bruno"

      RUN_SEED_ON_BOOT: "true"

      NODE_ENV: "production"
      TZ: "America/Sao_Paulo"

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        order: start-first
        failure_action: rollback
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public"

        - "traefik.http.routers.gracie-saas.rule=Host(`bgaf.simplificaonline.site`)"
        - "traefik.http.routers.gracie-saas.entrypoints=websecure"
        - "traefik.http.routers.gracie-saas.tls=true"
        - "traefik.http.routers.gracie-saas.tls.certresolver=le"
        - "traefik.http.routers.gracie-saas.service=gracie-saas-app"

        - "traefik.http.services.gracie-saas-app.loadbalancer.server.port=3000"

  postgres:
    image: postgres:16-alpine
    networks:
      - gracie-saas-internal
    environment:
      POSTGRES_USER: "gracie_saas"
      POSTGRES_PASSWORD: ""
      POSTGRES_DB: "gracie_saas"
    volumes:
      - gracie_saas_postgres_data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s

networks:
  traefik-public:
    external: true

  gracie-saas-internal:
    driver: overlay
    attachable: true

volumes:
  gracie_saas_postgres_data:
    driver: local
