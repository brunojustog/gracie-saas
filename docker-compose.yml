services:
  db:
    image: postgres:16
    container_name: gracie-saas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gracie
      POSTGRES_PASSWORD: gracie
      POSTGRES_DB: gracie_saas
    ports:
      - "5433:5432"
    volumes:
      - gracie_saas_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gracie -d gracie_saas"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gracie_saas_db:
